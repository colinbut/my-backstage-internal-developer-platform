services:
  postgres:
    image: postgres:18-trixie
    env_file: ".env"
    environment:
      POSTGRES_USER: ${POSTGRES_USR}
      POSTGRES_PASSWORD: ${POSTGRES_PWD}
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USR}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backstage:
    image: backstage-idp:v1.0
    env_file: ".env"
    ports:
      - "7007:7007"
    depends_on:
      postgres:
        condition: service_healthy
